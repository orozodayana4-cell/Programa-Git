<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Pedidos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">📦 Mis Pedidos</h2>

  <div id="lista-pedidos"></div>

  <a href="index.php" class="btn btn-dark mt-3">⬅ Volver</a>
</div>

<script>
const pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

const contenedor = document.getElementById("lista-pedidos");

if (pedidos.length === 0) {
  contenedor.innerHTML = "<p>No hay pedidos</p>";
} else {
  pedidos.reverse().forEach(p => {
    contenedor.innerHTML += `
      <div class="card mb-3 p-3">
        <strong>Pedido #${p.id}</strong><br>
        Fecha: ${p.fecha}<br>
        Total: $${p.total.toLocaleString()}<br>

        <a href="estado.html?id=${p.id}" class="btn btn-primary mt-2">
          Ver estado
        </a>
      </div>
    `;
  });
}
</script>

</body>
</html>
