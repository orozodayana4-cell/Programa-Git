<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estado del Pedido</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background-color: #f5f6fa;
  font-family: Arial, sans-serif;
}

.estado {
  max-width: 700px;
  margin: auto;
  margin-top: 50px;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  font-weight: bold;
}

.paso {
  padding: 15px;
  border-left: 4px solid #ccc;
  margin-bottom: 15px;
  border-radius: 8px;
  background: #fafafa;
  transition: all 0.3s ease;
}

.paso.activo {
  border-color: #28a745;
  background: #e9f7ef;
  transform: scale(1.02);
}

.paso::before {
  content: "•";
  color: #ccc;
  font-size: 20px;
  margin-right: 10px;
}

.paso.activo::before {
  color: #28a745;
}

ul {
  list-style: none;
  padding: 0;
}

ul li {
  background: #f1f2f6;
  padding: 10px;
  margin-bottom: 5px;
  border-radius: 6px;
}

.btn-dark {
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="estado">
  <h2 class="text-center">📦 Estado del Pedido</h2>
  <p id="fecha"></p>

  <div id="pasos">
    <div class="paso" id="p1">🧾 Pedido recibido</div>
    <div class="paso" id="p2">📦 Preparando pedido</div>
    <div class="paso" id="p3">🚚 En camino</div>
    <div class="paso" id="p4">✅ Entregado</div>
  </div>

  <div class="mt-4">
    <h5>Productos:</h5>
    <ul id="productos"></ul>
  </div>

  <a href="index.php" class="btn btn-dark mt-3">⬅ Volver a la tienda</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

const pedido = pedidos.find(p => p.id == id);

if (!pedido) {
  document.body.innerHTML = "<h3 class='text-center mt-5'>Pedido no encontrado</h3>";
} else {

  document.getElementById("fecha").innerText = "Fecha: " + pedido.fecha;

  const lista = document.getElementById("productos");

  pedido.productos.forEach(p => {
    lista.innerHTML += `
      <li>
        ${p.nombre} x ${p.cantidad} - 
        $${(p.precio * p.cantidad).toLocaleString()}
      </li>
    `;
  });

  let paso = 1;

  function actualizarEstado() {
    if (paso <= 4) {
      document.getElementById("p" + paso).classList.add("activo");
      paso++;
      setTimeout(actualizarEstado, 2000);
    }
  }

  actualizarEstado();
}
</script>

</body>
</html>
