<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Femenino</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body class="pagina-catalogo">

<nav class="navbar p-3" style="background: linear-gradient(90deg,#ff4fa3,#a84ff1);">
  <a href="index.php" class="text-white text-decoration-none">⬅ Volver</a>
  <h5 class="text-white m-0">👙 Catálogo Femenino</h5>
  <span id="contador-carrito" class="badge bg-light text-dark">0</span>
</nav>

<div class="container mt-4">
  <div class="row g-4" id="catalogo"></div>
</div>

<!-- 🛒 CARRITO -->
<div id="carritoLateral" class="carrito-lateral">
  <div class="carrito-header">
    <h5>🛒 Carrito</h5>
    <button id="cerrarCarrito">✖</button>
  </div>
  <div id="carrito-items"></div>
  <div class="carrito-footer">
    <strong>Total: $<span id="carrito-total">0</span></strong>
    <button id="btnPagar" class="btn btn-success w-100 mt-2">Finalizar compra</button>
  </div>
</div>

<div id="overlayCarrito" class="overlay-carrito"></div>

<!-- 🛍️ MODAL -->
<div id="modalProducto" class="modal-producto">
  <div class="modal-contenido">
    <span id="cerrarModal" class="cerrar-modal">✖</span>

    <div class="modal-body">
      <img id="modalImg" class="modal-img">
      <div class="modal-info">
        <h3 id="modalNombre"></h3>
        <p id="modalPrecio"></p>
        <p>Producto de alta calidad, cómodo y elegante.</p>
        <button id="modalAgregar" class="btn btn-dark w-100">🛒 Agregar al carrito</button>
      </div>
    </div>
  </div>
</div>

<div id="toggleMiniCarrito" style="position:fixed; top:10px; right:50px; font-size:25px; cursor:pointer;">
🛒
</div>

<!-- 🔥 PRODUCTOS PRIMERO -->
<script>
const productos = [
  {nombre:"Brasier Encaje", precio:45000, img:"https://m.media-amazon.com/images/I/81eGgg-PqqL._AC_UY1000_.jpg"},
  {nombre:"Panty Algodón", precio:20000, img:"https://yurika.co/wp-content/uploads/2020/09/panty-390-blanco.jpeg"},
  {nombre:"Body Elegante", precio:70000, img:"https://img.kwcdn.com/product/Fancyalgo/VirtualModelMatting/de62ed3920302d2f273b1715d95c9273.jpg"},
  {nombre:"Conjunto Lencería", precio:65000, img:"https://m.media-amazon.com/images/I/71ohwHPfYUL._AC_UY1000_.jpg"}
];

const contenedor = document.getElementById("catalogo");

productos.forEach(p => {
  contenedor.innerHTML += `
    <div class="col-md-3">
      <div class="card product-card">
        <div style="position:relative;">
  <img src="${p.img}" class="card-img-top">
  <div class="img-overlay"></div>
  <div class="texto-overlay">Ver producto</div>
</div>
        <div class="card-body text-center">
          <h5>${p.nombre}</h5>
          <p>$${p.precio.toLocaleString()}</p>
          <button class="btn btn-dark agregar-carrito"
            data-nombre="${p.nombre}"
            data-precio="${p.precio}">
            Agregar al carrito
          </button>
        </div>
      </div>
    </div>
  `;
});
</script>

<script src="script.js"></script>

</body>
</html>
